[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 50

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#10b981"
backgroundColor = "#060912"
secondaryBackgroundColor = "#0f172a"
textColor = "#f1f5f9"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"
